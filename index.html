<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LYNQUP Certificate Verification</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f3f3f3;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
    }

    .container{
      width:100%;
      max-width:950px;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .logo{
      text-align:center;
      margin-bottom:25px;
    }

    .logo h1{
      font-size:60px;
      color:#6a00ff;
      font-weight:bold;
    }

    .logo p{
      font-size:20px;
      color:#444;
      margin-top:5px;
    }

    .search-box{
      margin-top:25px;
    }

    .search-box input{
      width:100%;
      padding:18px;
      border-radius:12px;
      border:2px solid #222;
      font-size:20px;
      margin-bottom:15px;
    }

    .search-box button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:12px;
      background:linear-gradient(to right,#5f00ff,#8f00ff);
      color:white;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;
    }

    .search-box button:hover{
      opacity:0.9;
    }

    .result-box{
      margin-top:45px;
      display:none;
    }

    .verified-icon{
      width:120px;
      height:120px;
      border-radius:50%;
      background:#18b86a;
      display:flex;
      justify-content:center;
      align-items:center;
      margin:auto;
      color:white;
      font-size:70px;
      font-weight:bold;
    }

    .verified-title{
      text-align:center;
      color:#18b86a;
      font-size:50px;
      font-weight:bold;
      margin-top:20px;
      margin-bottom:35px;
    }

    .certificate-image-box{
      text-align:center;
      margin-bottom:35px;
    }

    .certificate-image-box img{
      width:100%;
      max-width:750px;
      border-radius:15px;
      border:2px solid #ddd;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    .detail-row{
      display:flex;
      justify-content:space-between;
      padding:20px 0;
      border-bottom:1px solid #ddd;
      gap:20px;
    }

    .label{
      font-size:26px;
      font-weight:bold;
      color:#555;
    }

    .value{
      font-size:26px;
      color:#222;
      text-align:right;
    }

    .verified-status{
      color:#18b86a;
      font-weight:bold;
    }

    .footer{
      text-align:center;
      margin-top:35px;
      color:#666;
      font-size:16px;
    }

    @media(max-width:700px){

      .detail-row{
        flex-direction:column;
      }

      .value{
        text-align:left;
      }

      .verified-title{
        font-size:38px;
      }

      .label,
      .value{
        font-size:20px;
      }

      .logo h1{
        font-size:45px;
      }
    }

  </style>

</head>

<body>

  <div class="container">

    <div class="logo">
      <h1>LYNQUP</h1>
      <p>Certificate Verification Portal</p>
    </div>

    <div class="search-box">

      <input
        type="text"
        id="certificateId"
        placeholder="Enter Certificate ID"
      >

      <button onclick="verifyCertificate()">
        Verify Certificate
      </button>

    </div>

    <div class="result-box" id="resultBox">

      <div class="verified-icon">
        ✓
      </div>

      <div class="verified-title">
        Certificate Verified
      </div>

      <!-- CERTIFICATE IMAGE -->

      <div class="certificate-image-box">

        <img
          id="certificateImage"
          src=""
          alt="Certificate Image"
        >

      </div>

      <!-- DETAILS -->

      <div class="detail-row">
        <div class="label">Certificate ID</div>
        <div class="value" id="cid"></div>
      </div>

      <div class="detail-row">
        <div class="label">Participant Name</div>
        <div class="value" id="pname"></div>
      </div>

      <div class="detail-row">
        <div class="label">Event</div>
        <div class="value" id="event"></div>
      </div>

      <div class="detail-row">
        <div class="label">Issue Date</div>
        <div class="value" id="date"></div>
      </div>

      <div class="detail-row">
        <div class="label">Organization</div>
        <div class="value" id="org"></div>
      </div>

      <div class="detail-row">
        <div class="label">Verification Status</div>

        <div class="value verified-status">
          VERIFIED
        </div>
      </div>

      <div class="footer">
        This certificate has been digitally verified
        by LYNQUP PRIVATE LIMITED.
      </div>

    </div>

  </div>

  <script>

    // CERTIFICATE DATABASE

    const certificates = {

      "PB26-110": {
        name: "Lakshya Utreja",
        event: "PROMPT BUILDER 2026",
        date: "20 February 2026",
        organization: "LYNQUP PRIVATE LIMITED",
        image: "images/pb26-110.png"
      },

      "PB26-107": {
        name: "Rhea Tiwary",
        event: "PROMPT BUILDER 2026",
        date: "20 February 2026",
        organization: "LYNQUP PRIVATE LIMITED",
        image: "images/pb26-107.png"
      },

      "PB26-105": {
        name: "Muskan Lanjiwar",
        event: "PROMPT BUILDER 2026",
        date: "20 February 2026",
        organization: "LYNQUP PRIVATE LIMITED",
        image: "images/pb26-105.png"
      }

    };



    // VERIFY FUNCTION

    function verifyCertificate() {

      let enteredId =
        document.getElementById("certificateId")
        .value
        .trim();

      if(certificates[enteredId]) {

        let cert = certificates[enteredId];

        // SHOW RESULT BOX

        document.getElementById("resultBox")
          .style.display = "block";

        // SHOW DETAILS

        document.getElementById("cid")
          .innerText = enteredId;

        document.getElementById("pname")
          .innerText = cert.name;

        document.getElementById("event")
          .innerText = cert.event;

        document.getElementById("date")
          .innerText = cert.date;

        document.getElementById("org")
          .innerText = cert.organization;

        // SHOW CERTIFICATE IMAGE

        document.getElementById("certificateImage")
          .src = cert.image;

      }

      else {

        alert("Certificate Not Found");

        document.getElementById("resultBox")
          .style.display = "none";
      }
    }



    // AUTO VERIFY FROM URL

    const urlParams =
      new URLSearchParams(window.location.search);

    const certId = urlParams.get('id');

    if(certId){

      document.getElementById("certificateId")
        .value = certId;

      verifyCertificate();
    }

  </script>

</body>

</html>
