<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LYNQUP Certificate Verification</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f3f3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 850px;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo h1 {
      color: #6a00ff;
      font-size: 55px;
      font-weight: bold;
    }

    .logo p {
      font-size: 18px;
      margin-top: 5px;
    }

    .search-box {
      margin-top: 20px;
    }

    .search-box input {
      width: 100%;
      padding: 18px;
      border-radius: 12px;
      border: 2px solid #222;
      font-size: 20px;
      margin-bottom: 18px;
    }

    .search-box button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(to right, #5f00ff, #8f00ff);
      color: white;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }

    .search-box button:hover {
      opacity: 0.9;
    }

    .verified-section {
      margin-top: 45px;
      display: none;
    }

    .verified-icon {
      width: 120px;
      height: 120px;
      background: #19b96b;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: auto;
      color: white;
      font-size: 70px;
      font-weight: bold;
    }

    .verified-title {
      text-align: center;
      color: #19b96b;
      font-size: 52px;
      margin-top: 20px;
      margin-bottom: 35px;
      font-weight: bold;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #ddd;
      padding: 20px 0;
      gap: 20px;
    }

    .label {
      font-weight: bold;
      color: #555;
      font-size: 28px;
    }

    .value {
      color: #222;
      font-size: 28px;
      text-align: right;
    }

    .verified-status {
      color: #19b96b;
      font-weight: bold;
    }

    .footer {
      margin-top: 35px;
      text-align: center;
      color: #666;
      font-size: 16px;
    }

    @media(max-width:700px) {

      .detail-row {
        flex-direction: column;
      }

      .value {
        text-align: left;
      }

      .verified-title {
        font-size: 38px;
      }

      .label,
      .value {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo">
      <h1>LYNQUP</h1>
      <p>Certificate Verification Portal</p>
    </div>

    <div class="search-box">
      <input type="text" id="certificateId" placeholder="Enter Certificate ID">
      <button onclick="verifyCertificate()">
        Verify Certificate
      </button>
    </div>

    <div class="verified-section" id="result">

      <div class="verified-icon">
        ✓
      </div>

      <div class="verified-title">
        Certificate Verified
      </div>

      <div class="detail-row">
        <div class="label">Certificate ID</div>
        <div class="value" id="cid"></div>
      </div>

      <div class="detail-row">
        <div class="label">Participant Name</div>
        <div class="value" id="pname"></div>
      </div>

      <div class="detail-row">
        <div class="label">Event</div>
        <div class="value" id="event"></div>
      </div>

      <div class="detail-row">
        <div class="label">Issue Date</div>
        <div class="value" id="date"></div>
      </div>

      <div class="detail-row">
        <div class="label">Organization</div>
        <div class="value" id="org"></div>
      </div>

      <div class="detail-row">
        <div class="label">Verification Status</div>
        <div class="value verified-status">
          VERIFIED
        </div>
      </div>

      <div class="footer">
        This certificate has been digitally verified by
        LYNQUP PRIVATE LIMITED.
      </div>

    </div>

  </div>

  <script>

    // CERTIFICATE DATABASE

    const certificates = {

      "PB26-110": {
        name: "Lakshya Utreja",
        event: "PROMPT BUILDER 2026",
        date: "20 February 2026",
        organization: "LYNQUP PRIVATE LIMITED"
      },

      "PB26-107": {
        name: "Rhea Tiwary",
        event: "PROMPT BUILDER 2026",
        date: "20 February 2026",
        organization: "LYNQUP PRIVATE LIMITED"
      }

    };



    // VERIFY FUNCTION

    function verifyCertificate() {

      let enteredId =
        document.getElementById("certificateId")
        .value
        .trim();

      if (certificates[enteredId]) {

        let cert = certificates[enteredId];

        document.getElementById("result")
          .style.display = "block";

        document.getElementById("cid")
          .innerText = enteredId;

        document.getElementById("pname")
          .innerText = cert.name;

        document.getElementById("event")
          .innerText = cert.event;

        document.getElementById("date")
          .innerText = cert.date;

        document.getElementById("org")
          .innerText = cert.organization;

      }

      else {

        alert("Certificate Not Found");

        document.getElementById("result")
          .style.display = "none";
      }
    }



    // AUTO VERIFY FROM URL

    const urlParams =
      new URLSearchParams(window.location.search);

    const certId = urlParams.get('id');

    if (certId) {

      document.getElementById("certificateId")
        .value = certId;

      verifyCertificate();
    }

  </script>

</body>

</html>
